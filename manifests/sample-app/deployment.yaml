apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-sample
  namespace: sample-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.14.2
        ports:
        - containerPort: 80
        volumeMounts:
        - name: data-vol
          mountPath: /usr/share/nginx/html
      volumes:
      - name: data-vol
        persistentVolumeClaim:
          claimName: nginx-pvc
